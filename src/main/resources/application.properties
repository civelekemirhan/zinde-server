# ‚îÄ‚îÄ Server ‚îÄ‚îÄ
spring.application.name=zinde-server
server.port=${PORT:8080}

# ‚îÄ‚îÄ Database (Railway PostgreSQL) ‚îÄ‚îÄ
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:zinde}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ‚îÄ‚îÄ Mail (Resend SMTP Bridge) ‚îÄ‚îÄ
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
mail.from=${MAIL_FROM:onboarding@resend.dev}

# ‚îÄ‚îÄ JWT ‚îÄ‚îÄ
# Uretim ortaminda en az 32 karakter uzunlugunda rastgele bir deger gir
jwt.secret=${JWT_SECRET:zinde-local-dev-secret-key-min-32-chars-change-in-prod}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}

# ‚îÄ‚îÄ Refresh Token ‚îÄ‚îÄ
refresh.expiry-days=${REFRESH_EXPIRY_DAYS:30}

# ‚îÄ‚îÄ Storage (Cloudflare R2 - S3 compatible) ‚îÄ‚îÄ
storage.endpoint=${STORAGE_ENDPOINT:https://placeholder.r2.cloudflarestorage.com}
storage.access-key=${STORAGE_ACCESS_KEY:placeholder}
storage.secret-key=${STORAGE_SECRET_KEY:placeholder}
storage.bucket=${STORAGE_BUCKET:zinde}
storage.region=${STORAGE_REGION:auto}
storage.public-url=${STORAGE_PUBLIC_URL:https://placeholder.r2.dev}

# ‚îÄ‚îÄ AWS Rekognition (gorsel moderasyon) ‚îÄ‚îÄ
aws.region=${AWS_REGION:eu-central-1}
aws.access-key=${AWS_ACCESS_KEY_ID:placeholder}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:placeholder}

# ‚îÄ‚îÄ OTP & Pending Registration ‚îÄ‚îÄ
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:3}
pending.expiry-minutes=${PENDING_EXPIRY_MINUTES:30}

# ‚îÄ‚îÄ Actuator (Railway health check) ‚îÄ‚îÄ
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
