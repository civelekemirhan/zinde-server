# ── Server ──
spring.application.name=zinde-server
server.port=${PORT:8080}
# Railway HTTPS proxy desteği
server.forward-headers-strategy=framework

# ── Database (Railway PostgreSQL) ──
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:zinde}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Mail (Brevo HTTP API) ──
brevo.api-key=${BREVO_API_KEY:}
mail.from=${MAIL_FROM:}

# ── JWT ──
# Uretim ortaminda en az 32 karakter uzunlugunda rastgele bir deger gir
jwt.secret=${JWT_SECRET:zinde-local-dev-secret-key-min-32-chars-change-in-prod}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}

# ── Refresh Token ──
refresh.expiry-days=${REFRESH_EXPIRY_DAYS:30}

# ── Storage artık Firebase Storage üzerinden çalışıyor ──
# Bucket adı Firebase Console > Storage > Files bölümünden alınır (gs:// olmadan)
firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET:zinde-90357.firebasestorage.app}

# ── AWS Rekognition (gorsel moderasyon) ──
aws.region=${AWS_REGION:eu-central-1}
aws.access-key=${AWS_ACCESS_KEY_ID:placeholder}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:placeholder}

# ── OTP & Pending Registration ──
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:3}
pending.expiry-minutes=${PENDING_EXPIRY_MINUTES:30}

# ── Upload ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator (Railway health check) ──
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# Local'de Swagger için
cors.allowed-origins=*

# ── Firebase (Storage + FCM) ──
# Prod/Railway: servis hesabı JSON içeriğini env variable olarak ver
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
# Lokal geliştirme: JSON dosyasının yolunu ver
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Springdoc Swagger ayarları
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html